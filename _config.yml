title: Silicon & Thoughts
subtitle: Microelectronics, AI, Physics and Life.
description: 孔一凡的个人技术博客，记录微电子、人工智能、物理、数学、编程、项目与大学生活。
keywords:
  - microelectronics
  - semiconductor devices
  - neuromorphic devices
  - artificial intelligence
  - computer vision
  - physics
  - math
author: 孔一凡
language: zh-CN
timezone: Asia/Shanghai

url: https://yifankong823-creator.github.io
root: /
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: prismjs

highlight:
  enable: false
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

prismjs:
  enable: true
  preprocess: true
  line_number: true
  tab_replace: ''

index_generator:
  path: ''
  per_page: 8
  order_by: -date

archive_generator:
  per_page: 20
  yearly: true
  monthly: true
  daily: false

category_generator:
  per_page: 10

tag_generator:
  per_page: 10

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

search:
  path: search.xml
  field: post
  content: true
  format: html

marked:
  prependRoot: true
  postAsset: true
  lazyload: false
  gfm: true
  breaks: false
  headerIds: true
  mangle: false

theme: silicon

deploy:
  type:
